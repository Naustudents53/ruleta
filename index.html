<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>La Ruleta</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #ece1cd;
    --cream: #f4ead6;
    --ink: #1c1813;
    --red: #9e2b20;
    --brass: #b3893f;
    --brass-2: #cda85d;
    --line: #1c1813;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    background-color: var(--paper);
    background-image: radial-gradient(rgba(28, 24, 19, 0.07) 1px, transparent 1.4px);
    background-size: 18px 18px;
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: clamp(1.5rem, 3vw, 3rem);
    align-items: start;
    padding: clamp(1.5rem, 4vw, 3.5rem);
  }

  @media (max-width: 880px) {
    body { grid-template-columns: 1fr; }
  }

  /* ---------- Cabecera ---------- */
  header.title { grid-column: 1 / -1; border-bottom: 3px solid var(--ink); padding-bottom: 1rem; }
  header.title h1 {
    margin: 0;
    font-family: "Fraunces", serif;
    font-weight: 900;
    font-size: clamp(2.6rem, 1rem + 6vw, 5.5rem);
    line-height: 0.92;
    letter-spacing: -0.02em;
    text-transform: uppercase;
  }
  header.title h1 em { font-style: italic; color: var(--red); }
  header.title p {
    margin: 0.5rem 0 0;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.35em;
    color: var(--ink);
    opacity: 0.65;
  }

  /* ---------- Escenario ---------- */
  .stage { display: grid; place-items: center; gap: 1.6rem; }

  .wheel-wrap { position: relative; width: min(72vw, 500px); aspect-ratio: 1; }

  .pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    width: 0; height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 34px solid var(--brass);
    filter: drop-shadow(0 2px 0 var(--ink));
  }
  .pointer::after {
    content: "";
    position: absolute;
    top: -38px; left: -18px;
    width: 0; height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 34px solid var(--ink);
    z-index: -1;
    transform: scale(1.18);
    transform-origin: top center;
  }

  canvas {
    width: 100%; height: 100%;
    border-radius: 50%;
    box-shadow:
      0 0 0 5px var(--ink),
      0 0 0 12px var(--brass-2),
      0 0 0 15px var(--ink),
      14px 16px 0 rgba(28, 24, 19, 0.16);
  }

  .hub {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 4;
    width: 23%;
    aspect-ratio: 1;
    border-radius: 50%;
    border: 3px solid var(--ink);
    cursor: pointer;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(0.75rem, 1.4vw, 1rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    background: var(--brass-2);
    box-shadow: 0 0 0 4px var(--cream), inset 0 -3px 0 rgba(28, 24, 19, 0.25);
    transition: transform 0.18s cubic-bezier(0.16, 1, 0.3, 1), background 0.15s;
  }
  .hub:hover:not(:disabled) { background: var(--brass); transform: translate(-50%, -50%) scale(1.05); }
  .hub:active:not(:disabled) { transform: translate(-50%, -50%) scale(0.95); }
  .hub:disabled { cursor: not-allowed; opacity: 0.55; }

  .result { text-align: center; display: grid; place-items: center; gap: 0.25rem; min-height: 4rem; }
  .result .label {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.3em; opacity: 0.6;
  }
  .result .winner {
    font-family: "Fraunces", serif;
    font-weight: 900;
    font-style: italic;
    font-size: clamp(1.8rem, 1rem + 3.5vw, 3.4rem);
    line-height: 1;
    color: var(--red);
  }
  .result .winner.pop { animation: pop 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
  @keyframes pop {
    0% { transform: scale(0.7) rotate(-3deg); opacity: 0; }
    60% { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ---------- Inputs y botones ---------- */
  .add-row { display: flex; gap: 0.5rem; }
  .stage-add { width: min(72vw, 500px); }

  input[type="text"] {
    flex: 1; min-width: 0;
    padding: 0.7rem 0.85rem;
    border: 2.5px solid var(--ink);
    border-radius: 4px;
    background: var(--cream);
    color: var(--ink);
    font-family: "Space Grotesk", sans-serif;
    font-size: 0.95rem;
  }
  input[type="text"]::placeholder { color: rgba(28, 24, 19, 0.45); }
  input[type="text"]:focus { outline: none; box-shadow: 4px 4px 0 var(--brass); }

  button.btn {
    border: 2.5px solid var(--ink);
    border-radius: 4px;
    padding: 0.7rem 1.1rem;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    background: var(--red);
    color: var(--cream);
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
  }
  button.btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }
  button.btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
  button.btn.ghost { background: var(--cream); color: var(--ink); }
  button.btn.ghost:hover { background: var(--brass-2); }

  /* ---------- Panel ---------- */
  .panel {
    background: var(--cream);
    border: 3px solid var(--ink);
    border-radius: 6px;
    box-shadow: 7px 7px 0 var(--ink);
    padding: 1.3rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .panel h2 {
    margin: 0;
    font-family: "Fraunces", serif;
    font-weight: 900;
    font-size: 1.4rem;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .panel h2 .count {
    font-family: "Space Grotesk", sans-serif;
    font-size: 0.7rem;
    vertical-align: middle;
    background: var(--ink);
    color: var(--cream);
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    margin-left: 0.4rem;
  }

  ul.options { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.45rem; max-height: 330px; overflow-y: auto; }
  ul.options li {
    display: flex; align-items: center; gap: 0.65rem;
    padding: 0.5rem 0.6rem;
    border: 2px solid var(--ink);
    border-radius: 4px;
    background: var(--paper);
  }
  ul.options li .dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--ink); flex-shrink: 0; }
  ul.options li .name { flex: 1; font-weight: 500; word-break: break-word; }
  ul.options li button {
    border: 2px solid var(--ink); background: var(--cream); color: var(--ink);
    cursor: pointer; font-size: 1rem; line-height: 1; width: 26px; height: 26px;
    border-radius: 4px; transition: background 0.12s, color 0.12s; flex-shrink: 0;
  }
  ul.options li button:hover { background: var(--red); color: var(--cream); }

  .footer-actions { display: flex; gap: 0.5rem; }
  .footer-actions .btn { flex: 1; }

  .hint { font-size: 0.76rem; line-height: 1.5; opacity: 0.7; margin: 0; }
  .hint strong { background: var(--brass-2); padding: 0 0.25rem; border-radius: 2px; }
</style>
</head>
<body>
  <header class="title">
    <h1>La <em>Ruleta</em></h1>
    <p>Gira · La suerte decide · Juega con tus amigos</p>
  </header>

  <section class="stage">
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheel" width="500" height="500"></canvas>
      <button class="hub" id="spinBtn">Girar</button>
    </div>
    <div class="result">
      <span class="label">Resultado</span>
      <span class="winner" id="winner">—</span>
    </div>
    <div class="add-row stage-add">
      <input type="text" id="newOptionStage" placeholder="Añadir un nombre a la ruleta..." maxlength="40" />
      <button class="btn" id="addBtnStage">Añadir</button>
    </div>
  </section>

  <aside class="panel">
    <h2>Nombres <span class="count" id="count">0</span></h2>
    <div class="add-row">
      <input type="text" id="newOption" placeholder="Nuevo nombre..." maxlength="40" />
      <button class="btn" id="addBtn">Añadir</button>
    </div>
    <ul class="options" id="optionList"></ul>
    <div class="footer-actions">
      <button class="btn ghost" id="shuffleBtn">Mezclar</button>
      <button class="btn ghost" id="resetBtn">Restaurar</button>
    </div>
    <p class="hint">Pulsa <strong>Enter</strong> para añadir rápido. Mantén <strong>Shift</strong> al girar para eliminar al ganador (sorteo sin repetición).</p>
  </aside>

<script>
(() => {
  "use strict";

  const DEFAULTS = ["Andre", "Ezequiel", "Cesar", "Leo", "Fray", "Daniel", "Chala"];
  // Paleta de casino: oxblood / tinta alternados, separadores y texto en latón.
  const SEG_RED = "#9e2b20";
  const SEG_INK = "#1c1813";
  const SEG_STROKE = "#cda85d";
  const SEG_TEXT = "#f4ead6";
  const SPIN_DURATION = 5200;
  const MIN_TURNS = 6;

  const canvas = document.getElementById("wheel");
  const ctx = canvas.getContext("2d");
  const spinBtn = document.getElementById("spinBtn");
  const winnerEl = document.getElementById("winner");
  const listEl = document.getElementById("optionList");
  const countEl = document.getElementById("count");
  const input = document.getElementById("newOption");
  const addBtn = document.getElementById("addBtn");
  const inputStage = document.getElementById("newOptionStage");
  const addBtnStage = document.getElementById("addBtnStage");
  const shuffleBtn = document.getElementById("shuffleBtn");
  const resetBtn = document.getElementById("resetBtn");

  let options = loadOptions();
  let currentRotation = 0;
  let spinning = false;

  function loadOptions() {
    try {
      const saved = JSON.parse(localStorage.getItem("ruleta_options_v3"));
      if (Array.isArray(saved) && saved.length) return saved;
    } catch (_) {}
    return [...DEFAULTS];
  }
  function saveOptions() {
    try { localStorage.setItem("ruleta_options_v3", JSON.stringify(options)); } catch (_) {}
  }

  function colorFor(i) { return i % 2 === 0 ? SEG_RED : SEG_INK; }

  function drawWheel() {
    const size = canvas.width;
    const cx = size / 2, cy = size / 2, r = size / 2 - 6;
    ctx.clearRect(0, 0, size, size);

    if (options.length === 0) {
      ctx.fillStyle = SEG_INK;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = SEG_TEXT;
      ctx.font = "600 22px 'Space Grotesk', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Añade nombres", cx, cy);
      return;
    }

    const slice = (Math.PI * 2) / options.length;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(currentRotation);

    options.forEach((opt, i) => {
      const start = i * slice;
      const end = start + slice;

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, r, start, end);
      ctx.closePath();
      ctx.fillStyle = colorFor(i);
      ctx.fill();
      ctx.strokeStyle = SEG_STROKE;
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.save();
      ctx.rotate(start + slice / 2);
      ctx.textAlign = "right";
      ctx.fillStyle = SEG_TEXT;
      const fontSize = Math.max(13, Math.min(24, 280 / options.length + 9));
      ctx.font = `700 ${fontSize}px 'Space Grotesk', sans-serif`;
      const text = opt.length > 18 ? opt.slice(0, 17) + "…" : opt;
      ctx.fillText(text, r - 20, 6);
      ctx.restore();
    });

    // Aro central de latón
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.16, 0, Math.PI * 2);
    ctx.fillStyle = SEG_STROKE;
    ctx.fill();
    ctx.lineWidth = 3;
    ctx.strokeStyle = SEG_INK;
    ctx.stroke();

    ctx.restore();
  }

  function renderList() {
    listEl.innerHTML = "";
    options.forEach((opt, i) => {
      const li = document.createElement("li");
      const dot = document.createElement("span");
      dot.className = "dot";
      dot.style.background = colorFor(i);
      const name = document.createElement("span");
      name.className = "name";
      name.textContent = opt;
      const del = document.createElement("button");
      del.textContent = "×";
      del.title = "Eliminar";
      del.addEventListener("click", () => {
        options.splice(i, 1);
        saveOptions();
        renderList();
        drawWheel();
      });
      li.append(dot, name, del);
      listEl.appendChild(li);
    });
    countEl.textContent = options.length;
    spinBtn.disabled = options.length < 2 || spinning;
  }

  function addOption(inputEl) {
    const val = inputEl.value.trim();
    if (!val) return;
    options.push(val);
    inputEl.value = "";
    inputEl.focus();
    saveOptions();
    renderList();
    drawWheel();
  }

  function shuffle() {
    for (let i = options.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [options[i], options[j]] = [options[j], options[i]];
    }
    saveOptions();
    renderList();
    drawWheel();
  }

  function reset() {
    options = [...DEFAULTS];
    saveOptions();
    renderList();
    drawWheel();
    winnerEl.textContent = "—";
  }

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function spin(removeWinner) {
    if (spinning || options.length < 2) return;
    spinning = true;
    spinBtn.disabled = true;
    winnerEl.textContent = "…";
    winnerEl.classList.remove("pop");

    const slice = (Math.PI * 2) / options.length;
    const targetIndex = Math.floor(Math.random() * options.length);
    const pointerAngle = -Math.PI / 2;
    const sliceCenter = targetIndex * slice + slice / 2;
    const baseTarget = pointerAngle - sliceCenter;
    const extraTurns = (MIN_TURNS + Math.random() * 2) * Math.PI * 2;
    const start = currentRotation % (Math.PI * 2);
    const finalRotation = baseTarget + extraTurns;
    const t0 = performance.now();

    function frame(now) {
      const t = Math.min((now - t0) / SPIN_DURATION, 1);
      currentRotation = start + (finalRotation - start) * easeOut(t);
      drawWheel();
      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        currentRotation = finalRotation;
        drawWheel();
        spinning = false;
        const winner = options[targetIndex];
        winnerEl.textContent = winner;
        void winnerEl.offsetWidth;
        winnerEl.classList.add("pop");
        if (removeWinner && options.length > 2) {
          setTimeout(() => {
            options.splice(targetIndex, 1);
            saveOptions();
            renderList();
            drawWheel();
          }, 900);
        }
        renderList();
      }
    }
    requestAnimationFrame(frame);
  }

  spinBtn.addEventListener("click", (e) => spin(e.shiftKey));
  addBtn.addEventListener("click", () => addOption(input));
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") addOption(input); });
  addBtnStage.addEventListener("click", () => addOption(inputStage));
  inputStage.addEventListener("keydown", (e) => { if (e.key === "Enter") addOption(inputStage); });
  shuffleBtn.addEventListener("click", shuffle);
  resetBtn.addEventListener("click", reset);

  renderList();
  drawWheel();
  // Redibuja cuando las fuentes terminan de cargar (para que el texto del canvas use Space Grotesk).
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(drawWheel);
})();
</script>
</body>
</html>
