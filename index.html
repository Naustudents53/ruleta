<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ruleta de la Fortuna</title>
<style>
  :root {
    --bg: oklch(18% 0.03 265);
    --bg-2: oklch(24% 0.05 280);
    --surface: oklch(26% 0.04 270 / 0.7);
    --border: oklch(70% 0.05 280 / 0.18);
    --text: oklch(96% 0.01 270);
    --muted: oklch(72% 0.02 270);
    --accent: oklch(75% 0.18 50);
    --accent-2: oklch(70% 0.17 330);
    --danger: oklch(65% 0.2 25);
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 600px at 15% -10%, oklch(35% 0.12 300 / 0.55), transparent 60%),
      radial-gradient(900px 500px at 110% 110%, oklch(40% 0.14 40 / 0.45), transparent 55%),
      linear-gradient(160deg, var(--bg), var(--bg-2));
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: clamp(1.5rem, 3vw, 3rem);
    align-items: start;
    padding: clamp(1.5rem, 4vw, 3.5rem);
  }

  @media (max-width: 880px) {
    body { grid-template-columns: 1fr; }
  }

  header.title {
    grid-column: 1 / -1;
    display: flex;
    align-items: baseline;
    gap: 0.9rem;
    flex-wrap: wrap;
  }
  header.title h1 {
    margin: 0;
    font-size: clamp(1.8rem, 1rem + 3vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(100deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header.title p {
    margin: 0;
    color: var(--muted);
    font-size: 0.95rem;
  }

  .stage {
    position: relative;
    display: grid;
    place-items: center;
    gap: 1.5rem;
  }

  .wheel-wrap {
    position: relative;
    width: min(70vw, 520px);
    aspect-ratio: 1;
  }

  /* Aguja / puntero */
  .pointer {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    width: 0;
    height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 38px solid var(--accent);
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
  }

  canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    box-shadow:
      0 0 0 12px oklch(30% 0.04 270 / 0.6),
      0 0 0 16px oklch(78% 0.16 50 / 0.55),
      0 30px 60px -15px rgba(0,0,0,0.6);
    transition: transform 0.1s;
  }

  /* Botón central de giro */
  .hub {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 4;
    width: 22%;
    aspect-ratio: 1;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-weight: 800;
    font-size: clamp(0.8rem, 1.4vw, 1.05rem);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--bg);
    background: radial-gradient(circle at 35% 30%, oklch(92% 0.06 80), var(--accent));
    box-shadow: 0 8px 20px -6px rgba(0,0,0,0.6), inset 0 -4px 8px rgba(0,0,0,0.25);
    transition: transform var(--ease) 0.25s, filter 0.2s;
  }
  .hub:hover:not(:disabled) { transform: translate(-50%, -50%) scale(1.06); }
  .hub:active:not(:disabled) { transform: translate(-50%, -50%) scale(0.96); }
  .hub:disabled { cursor: not-allowed; filter: grayscale(0.4) brightness(0.8); }

  .result {
    min-height: 3.4rem;
    text-align: center;
    display: grid;
    place-items: center;
    gap: 0.2rem;
  }
  .result .label { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.12em; }
  .result .winner {
    font-size: clamp(1.5rem, 1rem + 2.5vw, 2.6rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(100deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    transition: opacity 0.3s, transform 0.3s var(--ease);
  }
  .result .winner.pop { animation: pop 0.5s var(--ease); }
  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.12); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Panel lateral */
  .panel {
    background: var(--surface);
    backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.4rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .panel h2 {
    margin: 0;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .add-row { display: flex; gap: 0.5rem; }
  .stage-add { width: min(70vw, 520px); }
  input[type="text"] {
    flex: 1;
    min-width: 0;
    padding: 0.65rem 0.8rem;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: oklch(20% 0.02 270 / 0.8);
    color: var(--text);
    font-size: 0.95rem;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px oklch(75% 0.18 50 / 0.25);
  }

  button.btn {
    border: none;
    border-radius: 12px;
    padding: 0.65rem 1rem;
    font-weight: 700;
    cursor: pointer;
    color: var(--bg);
    background: linear-gradient(100deg, var(--accent), var(--accent-2));
    transition: transform 0.15s var(--ease), filter 0.15s;
  }
  button.btn:hover { transform: translateY(-2px); filter: brightness(1.08); }
  button.btn:active { transform: translateY(0); }
  button.btn.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  button.btn.ghost:hover { color: var(--text); border-color: var(--accent); }

  ul.options { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.4rem; max-height: 320px; overflow-y: auto; }
  ul.options li {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 0.65rem;
    border-radius: 10px;
    background: oklch(22% 0.02 270 / 0.6);
    border: 1px solid transparent;
    transition: border-color 0.15s;
  }
  ul.options li:hover { border-color: var(--border); }
  ul.options li .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  ul.options li .name { flex: 1; font-size: 0.92rem; word-break: break-word; }
  ul.options li button {
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0.1rem 0.3rem;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  ul.options li button:hover { color: var(--danger); background: oklch(65% 0.2 25 / 0.15); }

  .footer-actions { display: flex; gap: 0.5rem; }
  .footer-actions .btn { flex: 1; }

  .hint { color: var(--muted); font-size: 0.78rem; line-height: 1.4; }
</style>
</head>
<body>
  <header class="title">
    <h1>Ruleta de la Fortuna</h1>
    <p>Añade tus opciones, gira y deja que la suerte decida.</p>
  </header>

  <section class="stage">
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheel" width="520" height="520"></canvas>
      <button class="hub" id="spinBtn">Girar</button>
    </div>
    <div class="result">
      <span class="label">Resultado</span>
      <span class="winner" id="winner">—</span>
    </div>
    <div class="add-row stage-add">
      <input type="text" id="newOptionStage" placeholder="Añadir un nombre a la ruleta..." maxlength="40" />
      <button class="btn" id="addBtnStage">Añadir</button>
    </div>
  </section>

  <aside class="panel">
    <h2>Opciones</h2>
    <div class="add-row">
      <input type="text" id="newOption" placeholder="Nueva opción..." maxlength="40" />
      <button class="btn" id="addBtn">Añadir</button>
    </div>
    <ul class="options" id="optionList"></ul>
    <div class="footer-actions">
      <button class="btn ghost" id="shuffleBtn">Mezclar</button>
      <button class="btn ghost" id="resetBtn">Restaurar</button>
    </div>
    <p class="hint">Consejo: pulsa <strong>Enter</strong> para añadir rápido. El ganador se quita automáticamente solo si activas "modo eliminación" (mantén Shift al girar).</p>
  </aside>

<script>
(() => {
  "use strict";

  const DEFAULTS = ["Andre", "Ezequiel", "Cesar", "Leo", "Fray", "Daniel", "Chala"];
  const PALETTE = [
    "#ff6b6b", "#feca57", "#48dbfb", "#1dd1a1", "#5f27cd",
    "#ff9ff3", "#54a0ff", "#00d2d3", "#ff9f43", "#c8d6e5"
  ];
  const SPIN_DURATION = 5200; // ms
  const MIN_TURNS = 6;

  const canvas = document.getElementById("wheel");
  const ctx = canvas.getContext("2d");
  const spinBtn = document.getElementById("spinBtn");
  const winnerEl = document.getElementById("winner");
  const listEl = document.getElementById("optionList");
  const input = document.getElementById("newOption");
  const addBtn = document.getElementById("addBtn");
  const inputStage = document.getElementById("newOptionStage");
  const addBtnStage = document.getElementById("addBtnStage");
  const shuffleBtn = document.getElementById("shuffleBtn");
  const resetBtn = document.getElementById("resetBtn");

  let options = loadOptions();
  let currentRotation = 0; // radianes
  let spinning = false;

  // --- Persistencia ---
  function loadOptions() {
    try {
      const saved = JSON.parse(localStorage.getItem("ruleta_options_v3"));
      if (Array.isArray(saved) && saved.length) return saved;
    } catch (_) { /* ignora datos corruptos */ }
    return [...DEFAULTS];
  }
  function saveOptions() {
    try { localStorage.setItem("ruleta_options_v3", JSON.stringify(options)); } catch (_) {}
  }

  function colorFor(i) { return PALETTE[i % PALETTE.length]; }

  // --- Dibujo de la rueda ---
  function drawWheel() {
    const size = canvas.width;
    const cx = size / 2, cy = size / 2, r = size / 2 - 6;
    ctx.clearRect(0, 0, size, size);

    if (options.length === 0) {
      ctx.fillStyle = "#2a2a3a";
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#aaa";
      ctx.font = "20px system-ui";
      ctx.textAlign = "center";
      ctx.fillText("Añade opciones", cx, cy);
      return;
    }

    const slice = (Math.PI * 2) / options.length;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(currentRotation);

    options.forEach((opt, i) => {
      const start = i * slice;
      const end = start + slice;

      // sector
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, r, start, end);
      ctx.closePath();
      ctx.fillStyle = colorFor(i);
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.18)";
      ctx.lineWidth = 2;
      ctx.stroke();

      // texto
      ctx.save();
      ctx.rotate(start + slice / 2);
      ctx.textAlign = "right";
      ctx.fillStyle = "#1a1a25";
      ctx.font = `600 ${Math.max(12, Math.min(22, 280 / options.length + 8))}px system-ui`;
      const text = opt.length > 18 ? opt.slice(0, 17) + "…" : opt;
      ctx.fillText(text, r - 18, 6);
      ctx.restore();
    });

    ctx.restore();
  }

  // --- Lista lateral ---
  function renderList() {
    listEl.innerHTML = "";
    options.forEach((opt, i) => {
      const li = document.createElement("li");

      const dot = document.createElement("span");
      dot.className = "dot";
      dot.style.background = colorFor(i);

      const name = document.createElement("span");
      name.className = "name";
      name.textContent = opt;

      const del = document.createElement("button");
      del.textContent = "×";
      del.title = "Eliminar";
      del.addEventListener("click", () => {
        options.splice(i, 1);
        saveOptions();
        renderList();
        drawWheel();
      });

      li.append(dot, name, del);
      listEl.appendChild(li);
    });
    spinBtn.disabled = options.length < 2 || spinning;
  }

  // --- Añadir / mezclar / reset ---
  function addOption(inputEl) {
    const val = inputEl.value.trim();
    if (!val) return;
    options.push(val);
    inputEl.value = "";
    inputEl.focus();
    saveOptions();
    renderList();
    drawWheel();
  }

  function shuffle() {
    for (let i = options.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [options[i], options[j]] = [options[j], options[i]];
    }
    saveOptions();
    renderList();
    drawWheel();
  }

  function reset() {
    options = [...DEFAULTS];
    saveOptions();
    renderList();
    drawWheel();
    winnerEl.textContent = "—";
  }

  // --- Giro ---
  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function spin(removeWinner) {
    if (spinning || options.length < 2) return;
    spinning = true;
    spinBtn.disabled = true;
    winnerEl.textContent = "…";
    winnerEl.classList.remove("pop");

    const slice = (Math.PI * 2) / options.length;
    const targetIndex = Math.floor(Math.random() * options.length);

    // El puntero está arriba (-90° = -PI/2). Queremos que el centro del
    // sector ganador quede bajo el puntero.
    const pointerAngle = -Math.PI / 2;
    const sliceCenter = targetIndex * slice + slice / 2;
    const baseTarget = pointerAngle - sliceCenter;
    const extraTurns = (MIN_TURNS + Math.random() * 2) * Math.PI * 2;
    const start = currentRotation % (Math.PI * 2);
    const finalRotation = baseTarget + extraTurns;

    const t0 = performance.now();

    function frame(now) {
      const elapsed = now - t0;
      const t = Math.min(elapsed / SPIN_DURATION, 1);
      currentRotation = start + (finalRotation - start) * easeOut(t);
      drawWheel();

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        currentRotation = finalRotation;
        drawWheel();
        spinning = false;
        const winner = options[targetIndex];
        winnerEl.textContent = winner;
        void winnerEl.offsetWidth; // reinicia animación
        winnerEl.classList.add("pop");

        if (removeWinner && options.length > 2) {
          setTimeout(() => {
            options.splice(targetIndex, 1);
            saveOptions();
            renderList();
            drawWheel();
          }, 900);
        }
        renderList();
      }
    }
    requestAnimationFrame(frame);
  }

  // --- Eventos ---
  spinBtn.addEventListener("click", (e) => spin(e.shiftKey));
  addBtn.addEventListener("click", () => addOption(input));
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") addOption(input); });
  addBtnStage.addEventListener("click", () => addOption(inputStage));
  inputStage.addEventListener("keydown", (e) => { if (e.key === "Enter") addOption(inputStage); });
  shuffleBtn.addEventListener("click", shuffle);
  resetBtn.addEventListener("click", reset);

  // --- Init ---
  renderList();
  drawWheel();
})();
</script>
</body>
</html>
